name: Daily Orders Backup

on:
  schedule:
    # Runs every day at 2:00 AM UTC (9:00 PM Central)
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Also allows manual trigger from the GitHub Actions tab

jobs:
  backup:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # Needed to commit backup files
      id-token: write   # Needed for Workload Identity Federation

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/866878759961/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'firebase-adminsdk-fbsvc@insignia-screen-printing.iam.gserviceaccount.com'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install \
            firebase-admin \
            google-auth \
            google-api-python-client \
            google-auth-httplib2 \
            reportlab \
            sendgrid

      - name: Run backup
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: python tools/backup_orders.py

      - name: Commit backup files
        run: |
          git config user.name "ISP Backup Bot"
          git config user.email "backup@insigniascreenprinting.com"
          git add backups/
          git diff --cached --quiet || git commit -m "Daily backup $(date -u '+%Y-%m-%d')"
          git push
